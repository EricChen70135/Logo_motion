<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>JDB Hyper Reveal Demo 2</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #030303;
      --deep: #0b0605;
      --gold: #ffd56a;
      --orange: #ff6a1f;
      --red: #c51608;
      --cyan: #55f3ff;
      --ink: #fff5da;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      font-family: Arial, "Microsoft JhengHei", sans-serif;
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      color: var(--ink);
    }

    .scene {
      position: relative;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      isolation: isolate;
      display: grid;
      place-items: center;
      background:
        linear-gradient(145deg, #080403 0%, #020202 46%, #090706 100%),
        var(--bg);
    }

    .energy-canvas {
      position: absolute;
      inset: 0;
      z-index: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      animation: canvasIn 900ms cubic-bezier(.16, 1, .3, 1) forwards;
    }

    .grid {
      position: absolute;
      inset: -10%;
      z-index: 1;
      opacity: .22;
      background-image:
        linear-gradient(rgba(255, 255, 255, .055) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, .04) 1px, transparent 1px);
      background-size: 56px 56px;
      transform: perspective(900px) rotateX(58deg) translateY(14%);
      transform-origin: 50% 70%;
      mask-image: linear-gradient(to bottom, transparent, black 28%, black 74%, transparent);
      animation: gridDrive 4200ms cubic-bezier(.22, .8, .22, 1) forwards;
    }

    .gate {
      position: absolute;
      z-index: 2;
      width: min(92vw, 1220px);
      aspect-ratio: 684.05 / 259.52;
      border-top: 1px solid rgba(255, 213, 106, .62);
      border-bottom: 1px solid rgba(85, 243, 255, .35);
      opacity: 0;
      transform: scaleX(.25);
      filter: drop-shadow(0 0 18px rgba(255, 106, 31, .38));
      animation: gateOpen 1300ms cubic-bezier(.16, 1, .3, 1) 260ms forwards;
    }

    .gate::before,
    .gate::after {
      content: "";
      position: absolute;
      top: 50%;
      width: 31%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255, 245, 218, .9), transparent);
      transform: translateY(-50%) scaleX(0);
      animation: railSnap 900ms cubic-bezier(.16, 1, .3, 1) 640ms forwards;
    }

    .gate::before {
      left: -8%;
      transform-origin: right center;
    }

    .gate::after {
      right: -8%;
      transform-origin: left center;
    }

    .shockwave {
      position: absolute;
      z-index: 3;
      width: min(90vw, 1160px);
      aspect-ratio: 684.05 / 259.52;
      border: 1px solid rgba(255, 213, 106, .75);
      opacity: 0;
      transform: scale(.62);
      filter: drop-shadow(0 0 24px rgba(255, 106, 31, .42));
      animation: shock 1200ms cubic-bezier(.12, .8, .18, 1) 1360ms forwards;
      pointer-events: none;
    }

    .stage {
      position: relative;
      z-index: 4;
      width: min(76vw, 980px);
      max-width: calc(100vw - 36px);
      aspect-ratio: 684.05 / 259.52;
      display: grid;
      place-items: center;
      isolation: isolate;
      transform: translateY(26px) scale(.88);
      opacity: 0;
      filter: blur(15px);
      animation: logoArrive 1300ms cubic-bezier(.16, 1, .3, 1) 820ms forwards;
    }

    .stage::before {
      content: "";
      position: absolute;
      inset: -28% -18%;
      z-index: -2;
      background:
        conic-gradient(from 210deg at 50% 50%, transparent 0deg, rgba(255, 106, 31, .18) 44deg, transparent 92deg, rgba(85, 243, 255, .12) 138deg, transparent 214deg, rgba(255, 213, 106, .16) 286deg, transparent 360deg);
      opacity: 0;
      transform: rotate(-18deg) scale(.72);
      animation: reactor 2200ms cubic-bezier(.16, 1, .3, 1) 700ms forwards;
      mask-image: radial-gradient(ellipse at center, black 0 42%, transparent 72%);
    }

    .stage::after {
      content: "";
      position: absolute;
      inset: 7% -8%;
      z-index: -1;
      background:
        linear-gradient(90deg, transparent, rgba(255, 245, 218, .14), transparent),
        linear-gradient(90deg, transparent, rgba(255, 106, 31, .25), transparent);
      opacity: 0;
      transform: translateX(-72%) skewX(-18deg);
      animation: bladePass 1050ms cubic-bezier(.2, .8, .2, 1) 1550ms forwards;
      mix-blend-mode: screen;
    }

    .logo {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      transform-origin: center;
      filter:
        drop-shadow(0 22px 26px rgba(0, 0, 0, .52))
        drop-shadow(0 0 20px rgba(255, 106, 31, .3));
      animation: logoPulse 1450ms cubic-bezier(.16, 1, .3, 1) 1500ms forwards;
    }

    .flare {
      position: absolute;
      z-index: 5;
      inset: -10% -22%;
      opacity: 0;
      pointer-events: none;
      mix-blend-mode: screen;
      background:
        linear-gradient(105deg, transparent 30%, rgba(85, 243, 255, .22) 46%, rgba(255, 245, 218, .86) 50%, rgba(255, 213, 106, .28) 54%, transparent 70%);
      transform: translateX(-92%) skewX(-16deg);
      animation: hyperSlash 900ms cubic-bezier(.18, .9, .18, 1) 1940ms forwards;
    }

    .tagline {
      position: absolute;
      z-index: 6;
      left: 50%;
      bottom: clamp(38px, 9vh, 92px);
      transform: translateX(-50%) translateY(12px);
      opacity: 0;
      color: rgba(255, 245, 218, .84);
      font-size: clamp(12px, 1.35vw, 18px);
      line-height: 1;
      letter-spacing: .18em;
      white-space: nowrap;
      text-transform: uppercase;
      animation: tagIn 900ms cubic-bezier(.16, 1, .3, 1) 2450ms forwards;
    }

    .edge-mark {
      position: absolute;
      z-index: 2;
      width: 120px;
      height: 1px;
      opacity: 0;
      background: linear-gradient(90deg, transparent, rgba(255, 213, 106, .72), transparent);
      animation: edgeMark 1300ms cubic-bezier(.16, 1, .3, 1) 950ms forwards;
    }

    .edge-mark.one {
      left: 8vw;
      top: 18vh;
      transform: rotate(-18deg) translateX(-36px);
    }

    .edge-mark.two {
      right: 8vw;
      bottom: 18vh;
      transform: rotate(-18deg) translateX(36px);
      background: linear-gradient(90deg, transparent, rgba(85, 243, 255, .64), transparent);
    }

    @keyframes canvasIn {
      to { opacity: 1; }
    }

    @keyframes gridDrive {
      0% { opacity: 0; background-position: 0 0; }
      30% { opacity: .22; }
      100% { opacity: .16; background-position: 0 168px; }
    }

    @keyframes gateOpen {
      0% { opacity: 0; transform: scaleX(.25); }
      58% { opacity: 1; transform: scaleX(1.05); }
      100% { opacity: .42; transform: scaleX(1); }
    }

    @keyframes railSnap {
      to { transform: translateY(-50%) scaleX(1); }
    }

    @keyframes shock {
      0% { opacity: 0; transform: scale(.62); }
      18% { opacity: .94; }
      100% { opacity: 0; transform: scale(1.38); }
    }

    @keyframes logoArrive {
      0% { opacity: 0; transform: translateY(26px) scale(.88); filter: blur(15px); }
      64% { opacity: 1; filter: blur(0); }
      100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
    }

    @keyframes reactor {
      0% { opacity: 0; transform: rotate(-18deg) scale(.72); }
      56% { opacity: .95; }
      100% { opacity: .34; transform: rotate(16deg) scale(1.06); }
    }

    @keyframes bladePass {
      0% { opacity: 0; transform: translateX(-72%) skewX(-18deg); }
      20% { opacity: .95; }
      100% { opacity: 0; transform: translateX(72%) skewX(-18deg); }
    }

    @keyframes logoPulse {
      0% { transform: scale(1); }
      22% { transform: scale(1.032); }
      46% { transform: scale(.992); }
      100% { transform: scale(1); }
    }

    @keyframes hyperSlash {
      0% { opacity: 0; transform: translateX(-92%) skewX(-16deg); }
      18% { opacity: 1; }
      100% { opacity: 0; transform: translateX(92%) skewX(-16deg); }
    }

    @keyframes tagIn {
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    @keyframes edgeMark {
      0% { opacity: 0; }
      42% { opacity: .88; }
      100% { opacity: .28; }
    }

    @media (max-width: 720px) {
      .stage {
        width: 92vw;
      }

      .gate,
      .shockwave {
        width: 98vw;
      }

      .tagline {
        letter-spacing: .1em;
      }

      .edge-mark {
        width: 72px;
      }
    }
  </style>
</head>
<body>
  <main class="scene" aria-label="JDB logo motion demo 2">
    <canvas class="energy-canvas" aria-hidden="true"></canvas>
    <div class="grid" aria-hidden="true"></div>
    <div class="gate" aria-hidden="true"></div>
    <div class="shockwave" aria-hidden="true"></div>
    <div class="edge-mark one" aria-hidden="true"></div>
    <div class="edge-mark two" aria-hidden="true"></div>

    <section class="stage" aria-label="JDB logo">
      <img class="logo" src="LOGO/JDB.svg" alt="JDB">
      <div class="flare" aria-hidden="true"></div>
    </section>

    <div class="tagline">JUST DO THE BEST</div>
  </main>

  <script>
    const canvas = document.querySelector(".energy-canvas");
    const ctx = canvas.getContext("2d");
    const particles = [];
    const streaks = [];
    const particleCount = 90;
    const streakCount = 18;
    let width = 0;
    let height = 0;
    let dpr = 1;
    let startTime = 0;

    function resize() {
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = Math.floor(width * dpr);
      canvas.height = Math.floor(height * dpr);
      canvas.style.width = `${width}px`;
      canvas.style.height = `${height}px`;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function makeParticle(index) {
      const lane = index / particleCount;
      return {
        x: (lane * 977) % width,
        y: (lane * 431) % height,
        speed: 0.55 + (index % 7) * 0.16,
        size: 1 + (index % 4) * 0.45,
        phase: (index % 11) * 0.57,
        warm: index % 3 !== 0
      };
    }

    function makeStreak(index) {
      return {
        x: (index * 173) % width,
        y: (index * 97) % height,
        speed: 4.2 + (index % 5) * 1.15,
        length: 90 + (index % 6) * 28,
        alpha: 0.18 + (index % 4) * 0.07
      };
    }

    function seed() {
      particles.length = 0;
      streaks.length = 0;
      for (let i = 0; i < particleCount; i += 1) particles.push(makeParticle(i));
      for (let i = 0; i < streakCount; i += 1) streaks.push(makeStreak(i));
    }

    function drawParticles(time) {
      ctx.clearRect(0, 0, width, height);

      const intro = Math.min(1, time / 1200);
      const centerX = width * 0.5;
      const centerY = height * 0.5;

      ctx.globalCompositeOperation = "lighter";

      for (const p of particles) {
        p.x += p.speed * (1.2 + intro);
        p.y += Math.sin(time * 0.0016 + p.phase) * 0.35;
        if (p.x > width + 24) p.x = -24;

        const dx = p.x - centerX;
        const dy = p.y - centerY;
        const pull = Math.max(0, 1 - Math.hypot(dx, dy) / Math.max(width, height) * 1.6);
        const alpha = (0.12 + pull * 0.38) * intro;

        ctx.beginPath();
        ctx.fillStyle = p.warm ? `rgba(255, 129, 35, ${alpha})` : `rgba(85, 243, 255, ${alpha * 0.85})`;
        ctx.rect(p.x, p.y, p.size * 5, p.size);
        ctx.fill();
      }

      for (const s of streaks) {
        s.x += s.speed;
        s.y -= s.speed * 0.22;
        if (s.x > width + s.length) {
          s.x = -s.length;
          s.y = (s.y + height * 0.37) % height;
        }

        const gradient = ctx.createLinearGradient(s.x, s.y, s.x + s.length, s.y - s.length * 0.22);
        gradient.addColorStop(0, "rgba(255,255,255,0)");
        gradient.addColorStop(0.5, `rgba(255, 213, 106, ${s.alpha * intro})`);
        gradient.addColorStop(1, "rgba(85,243,255,0)");
        ctx.strokeStyle = gradient;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(s.x, s.y);
        ctx.lineTo(s.x + s.length, s.y - s.length * 0.22);
        ctx.stroke();
      }

      ctx.globalCompositeOperation = "source-over";
    }

    function loop(now) {
      if (!startTime) startTime = now;
      drawParticles(now - startTime);
      requestAnimationFrame(loop);
    }

    resize();
    seed();
    window.addEventListener("resize", () => {
      resize();
      seed();
    });
    requestAnimationFrame(loop);
  </script>
</body>
</html>
