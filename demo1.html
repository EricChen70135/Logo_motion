<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>JDB SVG Motion</title>
  <style>
    :root {
      color-scheme: dark;
      --line: #ffcf62;
      --line-hot: #ff5a18;
      --bg: #020202;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
    }

    body {
      display: grid;
      place-items: center;
      font-family: Arial, "Microsoft JhengHei", sans-serif;
    }

    .stage {
      position: relative;
      width: min(86vw, 980px);
      aspect-ratio: 684.05 / 259.52;
      display: grid;
      place-items: center;
      isolation: isolate;
    }

    .stage::before {
      content: "";
      position: absolute;
      inset: -34%;
      z-index: -2;
      background:
        radial-gradient(circle at 50% 50%, rgba(255, 126, 28, .18), transparent 34%),
        radial-gradient(circle at 50% 54%, rgba(255, 214, 100, .1), transparent 28%);
      opacity: 0;
      transform: scale(.72);
      animation: auraBuild 3.6s cubic-bezier(.18, .9, .18, 1) forwards;
    }

    .stage::after {
      content: "";
      position: absolute;
      inset: -12%;
      z-index: -1;
      opacity: .5;
      background-image:
        linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.035) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(circle at center, black 0 34%, transparent 70%);
    }

    .final-logo {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      opacity: 0;
      transform: scale(.985);
      filter:
        drop-shadow(0 0 0 rgba(255, 186, 55, 0))
        drop-shadow(0 0 0 rgba(255, 80, 10, 0));
      animation: finalLock 1.05s cubic-bezier(.18, .95, .18, 1) 2.72s forwards;
    }

    .motion-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    .ghost-fill {
      fill: rgba(255, 110, 25, .045);
      opacity: 0;
      transform-origin: 342px 130px;
      animation: ghostPulse 2.5s ease-in-out .25s forwards;
    }

    .outline-base {
      fill: none;
      stroke: rgba(255, 186, 58, .28);
      stroke-width: 2.4;
      stroke-linejoin: round;
      stroke-linecap: round;
      opacity: 0;
      filter: url(#warmGlow);
      animation: baseTrace 2.4s ease-out .16s forwards, baseFade .45s ease-out 2.68s forwards;
    }

    .fragment {
      fill: none;
      stroke-linejoin: round;
      stroke-linecap: round;
      vector-effect: non-scaling-stroke;
      opacity: 0;
      filter: url(#hotGlow);
      animation-name: randomTrace;
      animation-timing-function: cubic-bezier(.16, .9, .22, 1);
      animation-fill-mode: forwards;
    }

    .fragment.thin {
      stroke: var(--line);
      stroke-width: 2.1;
    }

    .fragment.hot {
      stroke: var(--line-hot);
      stroke-width: 3.1;
    }

    .fragment.white {
      stroke: rgba(255, 245, 210, .95);
      stroke-width: 1.4;
    }

    @keyframes randomTrace {
      0% {
        opacity: 0;
        stroke-dashoffset: var(--from);
      }

      12%,
      72% {
        opacity: var(--peak);
      }

      100% {
        opacity: 0;
        stroke-dashoffset: var(--to);
      }
    }

    @keyframes baseTrace {
      0% {
        opacity: 0;
        stroke-dasharray: 1 900;
        stroke-dashoffset: 320;
      }

      30% {
        opacity: .72;
      }

      100% {
        opacity: .58;
        stroke-dasharray: 900 0;
        stroke-dashoffset: 0;
      }
    }

    @keyframes baseFade {
      to {
        opacity: 0;
      }
    }

    @keyframes ghostPulse {
      0% {
        opacity: 0;
        transform: scale(.992);
      }

      40% {
        opacity: 1;
      }

      100% {
        opacity: 0;
        transform: scale(1.012);
      }
    }

    @keyframes finalLock {
      0% {
        opacity: 0;
        transform: scale(.985);
        filter:
          drop-shadow(0 0 0 rgba(255, 186, 55, 0))
          drop-shadow(0 0 0 rgba(255, 80, 10, 0));
      }

      46% {
        opacity: 1;
        transform: scale(1.018);
        filter:
          drop-shadow(0 0 22px rgba(255, 186, 55, .72))
          drop-shadow(0 0 46px rgba(255, 80, 10, .34));
      }

      100% {
        opacity: 1;
        transform: scale(1);
        filter:
          drop-shadow(0 0 10px rgba(255, 186, 55, .34))
          drop-shadow(0 0 24px rgba(255, 80, 10, .2));
      }
    }

    @keyframes auraBuild {
      0% {
        opacity: 0;
        transform: scale(.72);
      }

      50% {
        opacity: 1;
      }

      100% {
        opacity: .72;
        transform: scale(1);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: .001ms !important;
        animation-iteration-count: 1 !important;
      }
    }
  </style>
</head>
<body>
  <main class="stage" aria-label="JDB Logo 動態">
    <img class="final-logo" src="LOGO/JDB.svg" alt="JDB" />

    <svg class="motion-svg" viewBox="0 0 684.05 259.52" aria-hidden="true">
      <defs>
        <filter id="warmGlow" x="-30%" y="-60%" width="160%" height="220%">
          <feGaussianBlur stdDeviation="2.2" result="blur" />
          <feMerge>
            <feMergeNode in="blur" />
            <feMergeNode in="SourceGraphic" />
          </feMerge>
        </filter>

        <filter id="hotGlow" x="-40%" y="-80%" width="180%" height="260%">
          <feGaussianBlur stdDeviation="3.2" result="blur" />
          <feColorMatrix in="blur" type="matrix"
            values="1 0 0 0 1
                    0 0.64 0 0 .42
                    0 0 0.2 0 .05
                    0 0 0 .85 0" result="glow" />
          <feMerge>
            <feMergeNode in="glow" />
            <feMergeNode in="SourceGraphic" />
          </feMerge>
        </filter>

        <path id="jdb-main" d="M106.2,49.67L88.75,0h170.54l-17.45,49.67H106.2h0ZM476.96,65.18l-68.28,194.3h51.29l68.28-194.3h-51.29ZM348.34.01h-69.66l-17.45,49.67h81.74c43.34,0,53.4,45.36,40.08,84.91-21.16,62.83-61.31,75.16-117.84,75.16h-8.94l50.8-144.56h-51.29l-68.28,194.3h97.96c94.58,0,128.47-60.85,146.57-114.15C451.44,88.19,434.06.02,348.34.02h0ZM236.4,65.18h-51.29s-3.27,9.35-24.87,70.77c-11.57,32.9-24.65,51.14-38.36,61.47-13.61,10.26-30.02,12.05-52.06,12.05H17.57L0,259.48h77.63c31.1,0,53.25-5.48,71.83-17.76,21.91-14.49,38.73-39.11,51.33-75.19l35.61-101.35h0ZM621.62,98.73c9.9-11.28,16.98-26.48,16.98-41.4C638.6,28.86,616.57.01,579.11.01h-142.47l17.45,49.67h123.02c5.11,0,11.91,3.93,11.91,12.17,0,4.22-2.82,10.21-9.61,17.56-8.32,9.01-60.49,63.88-60.49,63.88h83.16c14.83,0,33.9,5.12,33.9,29.53,0,19.76-17.19,36.66-48.86,36.66h-93.29l-17.58,50.04h112.37c55.64,0,95.43-37.09,95.43-87.04,0-36.73-21.84-70.63-62.44-73.75h0Z" />
      </defs>

      <use class="ghost-fill" href="#jdb-main" />
      <use class="outline-base" href="#jdb-main" />

      <g id="fragments"></g>
    </svg>
  </main>

  <script>
    const sourceIds = ["jdb-main"];
    const fragmentGroup = document.querySelector("#fragments");

    const random = (min, max) => min + Math.random() * (max - min);

    sourceIds.forEach((id, sourceIndex) => {
      const source = document.querySelector(`#${id}`);
      const total = source.getTotalLength ? source.getTotalLength() : 480;
      const count = sourceIndex === 0 ? 30 : 8;

      for (let i = 0; i < count; i += 1) {
        const use = document.createElementNS("http://www.w3.org/2000/svg", "use");
        const style = ["thin", "hot", "white"][(i + sourceIndex) % 3];
        const dash = random(24, 92);
        const gap = total + random(180, 520);
        const from = random(total * -1.2, total * .92);
        const travel = random(180, 620) * (Math.random() > .5 ? 1 : -1);
        const delay = random(.05, 1.72);
        const duration = random(.56, 1.18);

        use.setAttribute("href", `#${id}`);
        use.classList.add("fragment", style);
        use.style.strokeDasharray = `${dash} ${gap}`;
        use.style.setProperty("--from", from.toFixed(2));
        use.style.setProperty("--to", (from + travel).toFixed(2));
        use.style.setProperty("--peak", random(.45, 1).toFixed(2));
        use.style.animationDelay = `${delay.toFixed(2)}s`;
        use.style.animationDuration = `${duration.toFixed(2)}s`;
        fragmentGroup.appendChild(use);
      }
    });
  </script>
</body>
</html>
